  <title>Tensor</title>
  <script>
    (function(){
      var t = localStorage.getItem('tensor-theme');
      if (t === 'dark' || (t == null && window.matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.dataset.theme = 'dark';
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <script>
    window.falconPrint = line => console.log('[falcon]', line);
    window.mistError = msg => console.error('[falcon error]', msg);

    async function loadFalconWasm() {
      try {
        const go = new Go();
        let result;
        if (WebAssembly.instantiateStreaming) {
          try {
            result = await WebAssembly.instantiateStreaming(fetch('/falcon.wasm'), go.importObject);
          } catch {}
        }
        if (!result) {
          const source = await (await fetch('/falcon.wasm')).arrayBuffer();
          result = await WebAssembly.instantiate(source, go.importObject);
        }
        go.run(result.instance);
      } catch (err) {
        console.error('[falcon-wasm] load error:', err);
      }
    }

    const wasmScript = document.createElement('script');
    wasmScript.src = '/wasm_exec.js';
    wasmScript.async = true;
    wasmScript.onload = loadFalconWasm;
    document.head.appendChild(wasmScript);
  </script>
